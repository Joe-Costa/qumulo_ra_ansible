# This playbook is intended to configure Rocky Linux or RedHat Linux hosted Qumulo-managed network mode nodes
# DO NOT USE this playebook if you intend to create a host-managed network Qumulo cluster.
---
- name: Configure Rocky or RedHat Linux System
  # Change this to match your hosts section
  hosts: nodes
  become: yes
  # Change remote_user to match your Linux account
  remote_user: qumulo
  tasks:

    - name: Verify distro compatibilty with this playbook
      fail:
        msg: "This is the wrong playbook for an Ubuntu/Debian node!!! Quitting..."
      when: ansible_os_family == "Debian"

    - name: Gathering service facts
      service_facts:

    - name: Check to see if qumulo-qcore is already present
      fail:
        msg: "qumulo-qcore is already loaded on this host!! Aborting playbook execution."
      when: "'qumulo-qcore.service' in ansible_facts.services"   
      
    - name: Disable and stop firewalld
      ansible.builtin.systemd:
        name: firewalld
        enabled: no
        state: stopped

    - name: Set SELinux to permissive
      ansible.builtin.command:
        cmd: setenforce 0
      ignore_errors: yes
      changed_when: false

    - name: Make SELinux changes persistent
      ansible.builtin.lineinfile:
        path: /etc/selinux/config
        regexp: '^SELINUX='
        line: 'SELINUX=permissive'

    - name: Apply kernel parameter kernel.io_uring_disabled=0
      ansible.builtin.sysctl:
        name: kernel.io_uring_disabled
        value: "0"
        sysctl_set: yes

    - name: Disable and stop NetworkManager
      ansible.builtin.systemd:
        name: NetworkManager
        enabled: no
        state: stopped

    - name: Back up and remove NM connection profiles
      ansible.builtin.shell: |
        mkdir -p /etc/NetworkManager/system-connections.disabled
        mv /etc/NetworkManager/system-connections/*.nmconnection /etc/NetworkManager/system-connections.disabled/ 2>/dev/null || true
        mkdir -p /etc/sysconfig/network-scripts.disabled
        for f in /etc/sysconfig/network-scripts/ifcfg-*; do
          [ "$f" = "/etc/sysconfig/network-scripts/ifcfg-lo" ] && continue
          mv "$f" /etc/sysconfig/network-scripts.disabled/ 2>/dev/null || true
        done
      args:
        executable: /bin/bash

    - name: Enable EPEL repository (Rocky only)
      ansible.builtin.dnf:
        name: epel-release
        state: present
      when: "'rocky' in ansible_distribution | lower"

    - name: Install systemd-networkd (Rocky and RHEL 9.4+)
      ansible.builtin.dnf:
        name: systemd-networkd
        state: present
      when: >
        ('rocky' in ansible_distribution | lower) or
        (ansible_distribution in ['RedHat', 'Red Hat Enterprise Linux'] and
         ansible_distribution_version is version('9.4', '>='))

    - name: Enable and start systemd-networkd (Rocky and RHEL 9.4+)
      ansible.builtin.systemd:
        name: systemd-networkd
        enabled: yes
        state: started
      when: >
        ('rocky' in ansible_distribution | lower) or
        (ansible_distribution in ['RedHat', 'Red Hat Enterprise Linux'] and
         ansible_distribution_version is version('9.4', '>='))

    - name: Install systemd-container and systemd-resolved (Rocky and RHEL 9.4+)
      ansible.builtin.dnf:
        name:
          - systemd-container
          - systemd-resolved
        state: present
      when: >
        ('rocky' in ansible_distribution | lower) or
        (ansible_distribution in ['RedHat', 'Red Hat Enterprise Linux'] and
         ansible_distribution_version is version('9.4', '>='))
    
    - name: Install podman and systemd-resolved (RHEL 9.3 and below)
      ansible.builtin.dnf:
        name:
          - podman
          - systemd-resolved
        state: present
      when: >
        ansible_distribution in ['RedHat', 'Red Hat Enterprise Linux'] and
        ansible_distribution_version is version('9.4', '<')

    - name: Enable and start systemd-resolved
      ansible.builtin.systemd:
        name: systemd-resolved
        enabled: yes
        state: started

    - name: Write static resolv.conf for DNS after NM is disabled
      # Edit these settings for your environment!
      ansible.builtin.copy:
        dest: /etc/resolv.conf
        content: |
          nameserver 10.120.249.57
          nameserver 10.122.246.1
          search qumulotest.local
        mode: '0644'
        force: true

    - name: Stop and disable chronyd
      ansible.builtin.systemd:
        name: chronyd
        enabled: no
        state: stopped
      ignore_errors: yes

    - name: Check if qumulo-core.rpm exists on Node and get its checksum
      ansible.builtin.stat:
        path: /tmp/qumulo-core.rpm
      register: remote_file_stat
      ignore_errors: yes

    - name: Report state of qumulo-core.rpm on remote node
      ansible.builtin.debug:
        msg: "qumulo-core.rpm is present: {{ remote_file_stat.stat.exists }}, Checksum: {{ remote_file_stat.stat.checksum if remote_file_stat.stat.exists else 'N/A' }}"
      
    - name: Copy qumulo-core.rpm to Node if needed (This may take some time)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/qumulo-core.rpm"
        dest: /tmp/qumulo-core.rpm
      when: remote_file_stat.stat.exists == False
      
    - name: Install qumulo-core.rpm
      ansible.builtin.dnf:
        name: /tmp/qumulo-core.rpm
        state: present
        disable_gpg_check: yes
      environment:
        QUMULO_NETWORK_MANAGED_BY_QUMULO: "true"

    # Reinstall openssh to match any OpenSSL version changes from qumulo-core dependencies
    - name: Reinstall openssh-server to match OpenSSL version
      ansible.builtin.dnf:
        name:
          - openssh-server
          - openssh-clients
        state: latest

    - name: Restart sshd
      ansible.builtin.systemd:
        name: sshd
        state: restarted

    - name: Clean up - Remove the qumulo-core.rpm file
      file:
        path: /tmp/qumulo-core.rpm
        state: absent